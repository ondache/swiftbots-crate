[package]
name = "swiftbots"
version = "0.0.0"
edition = "2024"

[dependencies]
tokio = { version = "1.52.1", features = ["sync", "rt"] }
tower = { version = "0.5.3", features = ["util"] }
tracing = "0.1.44"

[dev-dependencies]
http = "1.4.0"
serde_json = "1.0.149"
tokio = { version = "1.52.1", features = ["macros", "rt-multi-thread", "io-std", "io-util"] }
tracing-subscriber = "0.3.23"
